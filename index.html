<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>熱量分析小幫手</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        theme: '#C47D7E', // 根據圖3自訂的粉色
                        themeLight: '#d29697',
                        themeDark: '#ad6768'
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'PingFang TC', 'Helvetica Neue', 'Microsoft JhengHei', sans-serif;
            background-color: #f7f7f7;
        }
        .header-bg {
            background-color: #C47D7E;
            border-bottom-left-radius: 2rem;
            border-bottom-right-radius: 2rem;
        }
        .upload-dashed {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='16' ry='16' stroke='%23C47D7E' stroke-width='4' stroke-dasharray='10%2c 10' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
            border-radius: 16px;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #C47D7E;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // API 重試機制
        const fetchWithRetry = async (url, options, retries = 5) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        };

        // 呼叫真實的 Gemini AI 視覺模型進行分析
        const analyzeImageWithAI = async (base64Image, mimeType) => {
            const apiKey = ""; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const base64Data = base64Image.split(',')[1];

            const payload = {
                contents: [{
                    role: "user",
                    parts: [
                        { text: `你是一個專業的營養師與熱量分析小幫手。請分析這張圖片中的食物。請以純JSON格式回傳，必須包含以下欄位：\n{"foodName": "食物名稱與大約份量 (例如: 小米麻糬 約6顆)", "totalCalories": "總熱量估算 (例如: 約 540 ~ 780 kcal)", "breakdown": ["成分A: 約 XX kcal", "成分B: 約 XX kcal"], "keyPoints": ["熱量重點1", "熱量重點2"], "suggestion": "減脂期的吃法建議"}` },
                        { inlineData: { mimeType: mimeType, data: base64Data } }
                    ]
                }],
                generationConfig: { 
                    responseMimeType: "application/json"
                }
            };

            const result = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (textResponse) {
                return JSON.parse(textResponse);
            }
            throw new Error("No text returned from AI");
        };

        const App = () => {
            const [imageSrc, setImageSrc] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [showResult, setShowResult] = useState(false);
            const [analysisData, setAnalysisData] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            const [isDragging, setIsDragging] = useState(false);

            // 拖曳相關事件
            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };

            const handleDragLeave = (e) => {
                e.preventDefault();
                setIsDragging(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                const file = e.dataTransfer.files[0];
                processFile(file);
            };

            // 處理檔案與觸發 AI 分析
            const processFile = (file) => {
                if (!file) return;
                if (!file.type.startsWith('image/')) {
                    setErrorMsg('請上傳有效的圖片檔案！');
                    return;
                }
                
                setErrorMsg('');
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const base64 = event.target.result;
                    setImageSrc(base64);
                    setIsAnalyzing(true);
                    setShowResult(false);
                    setAnalysisData(null);
                    
                    try {
                        // 連接真實 AI
                        const aiResult = await analyzeImageWithAI(base64, file.type);
                        setAnalysisData(aiResult);
                        setShowResult(true);
                    } catch (err) {
                        console.error(err);
                        setErrorMsg('AI 分析發生錯誤，請確認圖片清晰或稍後再試。');
                    } finally {
                        setIsAnalyzing(false);
                    }
                };
                
                reader.onerror = () => {
                    setErrorMsg('讀取圖片失敗。');
                    setIsAnalyzing(false);
                };
                reader.readAsDataURL(file);
            };

            const handleImageUpload = (e) => {
                processFile(e.target.files[0]);
                e.target.value = null; // 重置 input
            };

            const resetUpload = () => {
                setImageSrc(null);
                setShowResult(false);
                setIsAnalyzing(false);
                setAnalysisData(null);
                setErrorMsg('');
            };

            return (
                <div className="min-h-screen max-w-2xl mx-auto bg-white shadow-xl overflow-hidden relative pb-20">
                    
                    {/* Header 區塊 */}
                    <div className="header-bg pt-12 pb-24 px-6 relative overflow-hidden text-center text-white">
                        {/* 裝飾圖案 */}
                        <div className="absolute top-4 left-4 opacity-30 text-3xl">🍓</div>
                        <div className="absolute top-10 right-10 opacity-30 text-3xl">🍗</div>
                        <div className="absolute bottom-8 left-12 opacity-30 text-3xl">🍟</div>
                        <div className="absolute top-6 right-1/4 opacity-30 text-3xl">🍅</div>
                        
                        <div className="relative z-10 flex flex-col items-center">
                            <div className="bg-white text-theme px-4 py-1 rounded-full text-sm font-bold mb-4 shadow-sm inline-block transform -rotate-3 border-2 border-white border-dashed">
                                美味試算小幫手！
                            </div>
                            <h1 className="text-4xl font-extrabold tracking-widest mb-3">熱量分析</h1>
                            <p className="text-white/90 font-medium">上傳餐點照片，立即獲得營養分析</p>
                        </div>
                    </div>

                    <div className="px-6 -mt-16 relative z-20">
                        {/* 錯誤提示 */}
                        {errorMsg && (
                            <div className="mb-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative">
                                {errorMsg}
                            </div>
                        )}

                        {/* 加大的圖片上傳區塊 (支援拖曳) */}
                        {!imageSrc ? (
                            <label 
                                className={`upload-dashed block w-full h-[400px] bg-gray-50 flex flex-col items-center justify-center cursor-pointer transition-colors duration-300 shadow-lg ${isDragging ? 'bg-theme/10 border-theme border-solid border-4' : 'hover:bg-theme/5'}`}
                                onDragOver={handleDragOver}
                                onDragLeave={handleDragLeave}
                                onDrop={handleDrop}
                            >
                                <div className="bg-white p-5 rounded-full shadow-md mb-4 text-theme">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                                </div>
                                <span className="text-xl font-bold text-gray-700 mb-2">點我上傳餐點圖片</span>
                                <span className="text-sm text-gray-400">支援 PNG、JPG、GIF、WEBP, 最大16MB</span>
                                <span className="text-xs text-theme mt-2 font-bold">(支援拖曳上傳)</span>
                                <input type="file" className="hidden" accept="image/*" onChange={handleImageUpload} />
                            </label>
                        ) : (
                            <div className="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden relative">
                                <div className="h-[300px] w-full relative bg-gray-100">
                                    <img src={imageSrc} alt="上傳的餐點" className="w-full h-full object-contain" />
                                    {/* 重新上傳按鈕 */}
                                    <button 
                                        onClick={resetUpload}
                                        className="absolute top-4 right-4 bg-black/50 hover:bg-black/70 text-white p-2 rounded-full transition-colors z-10"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 載入中動畫 */}
                        {isAnalyzing && (
                            <div className="py-16 flex flex-col items-center justify-center text-theme">
                                <div className="loader mb-4"></div>
                                <p className="font-bold text-lg animate-pulse">AI 正在為您辨識與精準計算熱量中...</p>
                            </div>
                        )}

                        {/* 真實 AI 分析結果 */}
                        {showResult && analysisData && (
                            <div className="mt-8 space-y-6 text-gray-800 pb-12">
                                
                                {/* 區塊 1：熱量估算 */}
                                <div className="bg-white rounded-xl border border-gray-100 p-5 shadow-sm">
                                    <h2 className="text-xl font-bold flex items-center gap-2 mb-4 border-b pb-2">
                                        <span className="text-2xl">🍡</span> 熱量估算
                                    </h2>
                                    <div className="space-y-3 pl-2">
                                        <div className="flex items-start gap-2 text-lg">
                                            <span className="text-theme mt-0.5">👉</span>
                                            <p><span className="font-bold">總熱量：</span>{analysisData.totalCalories}</p>
                                        </div>
                                    </div>
                                </div>

                                {/* 區塊 2：成分熱量拆解 */}
                                <div className="bg-white rounded-xl border border-gray-100 p-5 shadow-sm">
                                    <h2 className="text-xl font-bold flex items-center gap-2 mb-4 border-b pb-2">
                                        <span className="text-2xl">🔍</span> 成分熱量拆解
                                    </h2>
                                    <ul className="list-disc list-outside pl-6 space-y-2 text-gray-700">
                                        {analysisData.breakdown.map((item, idx) => (
                                            <li key={idx} className="font-medium">{item}</li>
                                        ))}
                                    </ul>
                                </div>

                                {/* 區塊 3：熱量重點 */}
                                <div className="bg-white rounded-xl border border-gray-100 p-5 shadow-sm">
                                    <h2 className="text-xl font-bold flex items-center gap-2 mb-4 border-b pb-2">
                                        <span className="text-2xl">⚠️</span> 熱量重點
                                    </h2>
                                    <ul className="list-disc list-outside pl-6 space-y-2 text-gray-700">
                                        {analysisData.keyPoints.map((point, idx) => (
                                            <li key={idx}>{point}</li>
                                        ))}
                                    </ul>
                                </div>

                                {/* 區塊 4：吃法建議 */}
                                <div className="bg-theme/10 rounded-xl border border-theme/30 p-5 shadow-sm">
                                    <h2 className="text-xl font-bold flex items-center gap-2 mb-4 border-b border-theme/20 pb-2 text-themeDark">
                                        <span className="text-2xl">💡</span> 吃法建議 (減脂友善版)
                                    </h2>
                                    <div className="flex items-center gap-2 text-green-700 font-bold bg-green-50 p-3 rounded-lg border border-green-100">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="shrink-0"><path d="M20 6 9 17l-5-5"/></svg>
                                        <span>{analysisData.suggestion}</span>
                                    </div>
                                </div>

                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
